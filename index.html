<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFPL | My Links</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script> <!-- Opcional para ícones -->
</head>
<body>

    <div class="background-decor">
        <img src="https://raw.githubusercontent.com/afporiginal/afporiginal/main/images/marin_kitagawa_sono_bisque_doll_png_render_by_marcopolo157_dgg94pj.png" alt="Marin Decor" class="marin-bg">
    </div>

    <main class="container">
        <header class="profile">
            <div class="avatar-wrapper">
                <img src="https://images.weserv.nl/?url=https://raw.githubusercontent.com/afporiginal/afporiginal/main/images/%F0%9D%96%AC%F0%9D%96%BA%F0%9D%97%8B%F0%9D%97%82%F0%9D%97%87%20%F0%9D%96%AA%F0%9D%97%82%F0%9D%97%8D%F0%9D%96%BA%F0%9D%97%80%F0%9D%96%BA%F0%9D%97%90%F0%9D%96%BA%20%E2%9C%BF.webp&w=200&h=200&fit=cover&mask=circle&output=png" alt="Avatar" class="avatar">
            </div>
            <h1>AFPL</h1>
            <p class="bio">Enthusiast & Marin Kitagawa's #1 Fan ✨</p>
        </header>

        <section class="links">
            <a href="https://github.com/afporiginal" target="_blank" class="link-card">
                <span>GitHub</span>
            </a>
            
            <a href="https://discord.com/users/afploriginal" target="_blank" class="link-card">
                <span>Discord (afploriginal)</span>
            </a>

            <div class="extra-image">
                <img src="https://raw.githubusercontent.com/afporiginal/afporiginal/main/images/Kitagawa_Marin-removebg-preview.png" alt="Marin Paz">
            </div>
        </section>

        <footer>
            <p>Made with ❤️ and Marin Supremacy</p>
        </footer>
    </main>

</body>
</html>
